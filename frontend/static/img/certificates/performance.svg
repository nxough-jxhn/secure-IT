  <circle cx="510" cy="464" r="3" fill="#00ff9f" opacity="0.5" filter="url(#glow)"/>

  <!-- ══ DESCRIPTION ══ -->
  <text x="510" y="496" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#9ae8c0" opacity="0.82" letter-spacing="0.3">
    This certificate is awarded in recognition of consistent dedication, commitment,
  </text>
  <text x="510" y="514" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#9ae8c0" opacity="0.82" letter-spacing="0.3">
    and measurable progress across all cybersecurity awareness training modules
  </text>
  <text x="510" y="532" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#9ae8c0" opacity="0.82" letter-spacing="0.3">
    on the Secure-IT platform. Your performance reflects a growing understanding
  </text>
  <text x="510" y="550" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#9ae8c0" opacity="0.82" letter-spacing="0.3">
