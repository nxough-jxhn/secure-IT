    <polygon points="440,208 444,220 457,220 447,228 451,240 440,232 429,240 433,228 423,220 436,220" fill="#00ff9f"/>
    <polygon points="510,202 515,217 530,217 519,226 523,241 510,233 497,241 501,226 490,217 505,217" fill="#00ff9f"/>
    <polygon points="580,208 584,220 597,220 587,228 591,240 580,232 569,240 573,228 563,220 576,220" fill="#00ff9f"/>
