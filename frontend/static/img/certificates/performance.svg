<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 720" width="1020" height="720">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#071a0f"/>
      <stop offset="55%"  stop-color="#040e08"/>
      <stop offset="100%" stop-color="#020704"/>
    </radialGradient>
    <!-- Central bloom -->
    <radialGradient id="bloom" cx="50%" cy="42%" r="38%">
      <stop offset="0%"   stop-color="#00ff9f" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00ff9f" stop-opacity="0"/>
    </radialGradient>
    <!-- Shine sweep — left diagonal -->
    <linearGradient id="shineL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="42%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#00ff9f" stop-opacity="0.07"/>
      <stop offset="52%"  stop-color="#ffffff" stop-opacity="0.11"/>
      <stop offset="56%"  stop-color="#00ff9f" stop-opacity="0.07"/>
      <stop offset="62%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Shine sweep — right side -->
    <linearGradient id="shineR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="44%"  stop-color="#00ff9f" stop-opacity="0.05"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="56%"  stop-color="#00ff9f" stop-opacity="0.05"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c8ffe8"/>
      <stop offset="38%"  stop-color="#00ff9f"/>
      <stop offset="100%" stop-color="#00a35a"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d2e1a"/>
      <stop offset="100%" stop-color="#061509"/>
    </linearGradient>
    <!-- Badge seal gradient -->
    <radialGradient id="sealG" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#1a4a2c"/>
      <stop offset="100%" stop-color="#061209"/>
    </radialGradient>
    <!-- Soft glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong glow -->
    <filter id="glowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Title bloom -->
    <filter id="titleBloom" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="9"  result="b1"/>
      <feGaussianBlur stdDeviation="3"  result="b2" in="SourceGraphic"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Name glow -->
    <filter id="nameGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

