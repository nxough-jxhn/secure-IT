    <line x1="802" y1="394" x2="792" y2="394"/><line x1="802" y1="394" x2="802" y2="384"/>
  </g>
  <text x="510" y="374" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11.5"
        letter-spacing="3.5" fill="#00ff9f" font-weight="bold">THIS CERTIFICATE IS PROUDLY PRESENTED TO:</text>

  <!-- ══ RECIPIENT NAME — replaced by JS ══ -->
  <text id="cert-recipient-name" x="510" y="450" text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="52" font-style="italic"
