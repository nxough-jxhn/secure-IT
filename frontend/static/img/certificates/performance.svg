  <g filter="url(#glow)" opacity="0.55">
    <circle cx="210" cy="215" r="1.5" fill="#00ff9f" opacity="0.8"/>
    <circle cx="240" cy="200" r="1"   fill="#00ff9f" opacity="0.6"/>
    <circle cx="195" cy="240" r="1"   fill="#00ff9f" opacity="0.5"/>
    <circle cx="800" cy="210" r="1.5" fill="#00ff9f" opacity="0.8"/>
    <circle cx="775" cy="198" r="1"   fill="#00ff9f" opacity="0.6"/>
    <circle cx="820" cy="238" r="1"   fill="#00ff9f" opacity="0.5"/>
    <circle cx="420" cy="190" r="1"   fill="#00ff9f" opacity="0.4"/>
    <circle cx="600" cy="188" r="1"   fill="#00ff9f" opacity="0.4"/>
    <circle cx="510" cy="192" r="1.5" fill="#00ff9f" opacity="0.5"/>
