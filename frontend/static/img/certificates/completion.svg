  </g>
  <text x="510" y="368" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11.5"
        letter-spacing="3.5" fill="#60a5fa" font-weight="bold">THIS CERTIFICATE IS PROUDLY PRESENTED TO:</text>

  <!-- Recipient name -->
  <text x="510" y="444" text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="52" font-style="italic"
        fill="#60a5fa" filter="url(#nameGlow)" opacity="0.95">{{NAME}}</text>
  <line x1="280" y1="458" x2="500" y2="458" stroke="#60a5fa" stroke-width="0.6" opacity="0.28"/>
  <line x1="520" y1="458" x2="740" y2="458" stroke="#60a5fa" stroke-width="0.6" opacity="0.28"/>
