    <text x="8" y="368">00010110</text><text x="8" y="382">11000101</text>
    <text x="8" y="396">01111010</text><text x="8" y="410">10100000</text>
    <text x="8" y="424">00001111</text><text x="8" y="438">11011011</text>
    <text x="8" y="452">01000100</text><text x="8" y="466">10110110</text>
    <text x="8" y="480">00111001</text><text x="8" y="494">11001010</text>
    <text x="8" y="508">01010000</text><text x="8" y="522">10101111</text>
    <text x="8" y="536">00100010</text><text x="8" y="550">11110101</text>
    <text x="8" y="564">01101100</text><text x="8" y="578">10010001</text>
    <text x="8" y="592">00011010</text><text x="8" y="606">11100110</text>
    <text x="8" y="620">01001001</text><text x="8" y="634">10111100</text>
