    <circle cx="420" cy="186" r="1"   fill="#60a5fa" opacity="0.4"/>
    <circle cx="600" cy="184" r="1"   fill="#60a5fa" opacity="0.4"/>
    <circle cx="510" cy="188" r="1.5" fill="#60a5fa" opacity="0.5"/>
