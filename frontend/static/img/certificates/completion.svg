<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 720" width="1020" height="720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#080f1a"/>
      <stop offset="55%"  stop-color="#050a12"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    <radialGradient id="bloom" cx="50%" cy="42%" r="38%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <!-- Shine: horizontal band across center — like a scanning line -->
    <linearGradient id="shineScan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="44%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="46%"  stop-color="#60a5fa" stop-opacity="0.04"/>
      <stop offset="48%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="0.04"/>
      <stop offset="52%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Additional left-to-right soft sweep -->
    <linearGradient id="shineLR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#60a5fa" stop-opacity="0.03"/>
      <stop offset="25%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="35%"  stop-color="#60a5fa" stop-opacity="0.03"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c8e0ff"/>
      <stop offset="38%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <radialGradient id="sealG" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#1a2e4a"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleBloom" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="9"  result="b1"/>
      <feGaussianBlur stdDeviation="3"  result="b2" in="SourceGraphic"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nameGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

