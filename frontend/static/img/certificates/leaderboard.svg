        font-size="52" font-style="italic"
        fill="#e07060" filter="url(#nameGlow)" opacity="0.95">{{NAME}}</text>
  <line x1="280" y1="464" x2="500" y2="464" stroke="#e07060" stroke-width="0.6" opacity="0.28"/>
  <line x1="520" y1="464" x2="740" y2="464" stroke="#e07060" stroke-width="0.6" opacity="0.28"/>
  <circle cx="510" cy="464" r="3" fill="#e07060" opacity="0.5" filter="url(#glow)"/>

