    <text x="8" y="88">00111010</text><text x="8" y="102">11001100</text>
    <text x="8" y="116">01010101</text><text x="8" y="130">10100110</text>
    <text x="8" y="144">00011101</text><text x="8" y="158">11100010</text>
    <text x="8" y="172">01001010</text><text x="8" y="186">10111001</text>
    <text x="8" y="200">00100111</text><text x="8" y="214">11010100</text>
    <text x="8" y="228">01110000</text><text x="8" y="242">10001011</text>
    <text x="8" y="256">00110101</text><text x="8" y="270">11101000</text>
