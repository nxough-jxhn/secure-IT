  <text x="510" y="496" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#f0b8b0" opacity="0.82" letter-spacing="0.3">
    This certificate is awarded in recognition of outstanding performance
  </text>
  <text x="510" y="514" text-anchor="middle"
        font-family="Georgia, serif" font-size="13.5" fill="#f0b8b0" opacity="0.82" letter-spacing="0.3">
