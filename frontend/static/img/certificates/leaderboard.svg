    <circle cx="820" cy="238" r="1"   fill="#e07060" opacity="0.5"/>
    <circle cx="420" cy="190" r="1"   fill="#e07060" opacity="0.4"/>
    <circle cx="600" cy="188" r="1"   fill="#e07060" opacity="0.4"/>
    <circle cx="510" cy="192" r="1.5" fill="#e07060" opacity="0.5"/>
  </g>

  <!-- 4 stars -->
  <g filter="url(#glow)" opacity="0.88">
    <polygon points="400,208 404,220 417,220 407,228 411,240 400,232 389,240 393,228 383,220 396,220" fill="#e07060"/>
    <polygon points="465,202 470,217 485,217 474,226 478,241 465,233 452,241 456,226 445,217 460,217" fill="#e07060"/>
    <polygon points="555,202 560,217 575,217 564,226 568,241 555,233 542,241 546,226 535,217 550,217" fill="#e07060"/>
    <polygon points="620,208 624,220 637,220 627,228 631,240 620,232 609,240 613,228 603,220 616,220" fill="#e07060"/>
