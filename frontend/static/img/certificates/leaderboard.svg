<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 720" width="1020" height="720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#1a0808"/>
      <stop offset="55%"  stop-color="#0e0404"/>
      <stop offset="100%" stop-color="#060202"/>
    </radialGradient>
    <radialGradient id="bloom" cx="50%" cy="42%" r="38%">
      <stop offset="0%"   stop-color="#e07060" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e07060" stop-opacity="0"/>
    </radialGradient>
    <!-- Sharp diagonal shine — thin hard-edged streak left side -->
    <linearGradient id="shineL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="31%"  stop-color="#e07060" stop-opacity="0.04"/>
      <stop offset="33%"  stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="35%"  stop-color="#e07060" stop-opacity="0.04"/>
      <stop offset="38%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Sharp streak right side -->
    <linearGradient id="shineR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="58%"  stop-color="#e07060" stop-opacity="0.04"/>
      <stop offset="61%"  stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="64%"  stop-color="#e07060" stop-opacity="0.04"/>
      <stop offset="67%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffcfc8"/>
      <stop offset="38%"  stop-color="#e07060"/>
      <stop offset="100%" stop-color="#8a2a1e"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2e0d0d"/>
      <stop offset="100%" stop-color="#150505"/>
    </linearGradient>
    <radialGradient id="sealG" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#4a1a1a"/>
      <stop offset="100%" stop-color="#120606"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleBloom" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="9"  result="b1"/>
      <feGaussianBlur stdDeviation="3"  result="b2" in="SourceGraphic"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nameGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

