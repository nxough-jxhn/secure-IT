<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block page_title %}{{ title }}{% endblock %} | Secure-IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#00ff9f',
              surface: '#111827',
              ink: '#0a0a0a',
            },
            fontFamily: {
              sans: ['Manrope', 'system-ui', 'sans-serif'],
              display: ['Instrument Serif', 'Georgia', 'serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="guest-page" style="display:flex;flex-direction:column;min-height:100vh;">
    {% include 'partials/site_header.html' %}

    <main class="guest-main" style="flex:1;">
      {% block content %}{% endblock %}
    </main>

    {% include 'partials/site_footer.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
      if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
        gsap.registerPlugin(ScrollTrigger);
      }
    </script>
    <script src="{{ url_for('static', filename='js/layout.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
