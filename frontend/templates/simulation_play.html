{% extends 'base.html' %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/simulations.css') }}">
{% endblock %}
{% block content %}
<section class="sim-breadcrumb">
  <a href="{{ url_for('simulation_overview_page', attack_id=attack.id) }}">← Back to overview</a>
</section>

<section class="sim-play-shell" id="sim-play-app">
  <div class="sim-play-header">
    <div>
      <div class="sim-badge">{{ attack.icon }} Live simulation</div>
      <h2 class="mt-2 text-2xl font-extrabold text-white" id="sim-step-title">Loading scenario...</h2>
      <p class="mt-2 max-w-3xl text-sm leading-7 text-slate-300" id="sim-step-narrative"></p>
    </div>
    <div class="sim-progress-wrap">
      <div class="flex items-center justify-between text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
        <span>Progress</span>
        <span id="sim-progress-label">Step 1</span>
      </div>
      <div class="sim-progress-bar mt-2">
        <div class="sim-progress-fill" id="sim-progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="mt-6 grid gap-5 xl:grid-cols-[1.1fr_0.9fr]">
    <div class="sim-interface-panel" id="sim-interface-panel"></div>
    <div>
      <div class="sim-panel">
        <h3 class="sim-panel-title">Your response</h3>
        <div class="mt-4 space-y-3" id="sim-choices"></div>
      </div>
      <div class="sim-feedback-panel hidden mt-4" id="sim-feedback-panel">
        <div class="text-xs font-bold uppercase tracking-[0.2em]" id="sim-feedback-label"></div>
        <h4 class="mt-2 text-lg font-bold text-white" id="sim-feedback-outcome"></h4>
        <p class="mt-2 text-sm leading-7 text-slate-300" id="sim-feedback-explanation"></p>
        <button type="button" class="sim-primary-btn mt-4" id="sim-next-btn">Continue</button>
      </div>
    </div>
  </div>
</section>

<script id="sim-play-data" type="application/json">{{ play_data | tojson }}</script>
<script src="{{ url_for('static', filename='js/simulation-play.js') }}"></script>
{% endblock %}
